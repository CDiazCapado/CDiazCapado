<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-label="Contact — open to ML, MLOps, AI Engineer and Senior SDET with AI roles">
  <defs>
    <linearGradient id="contactbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FEFDF9"/>
      <stop offset="50%" stop-color="#FEFDFA"/>
      <stop offset="100%" stop-color="#FBFDFE"/>
    </linearGradient>
    <radialGradient id="c1">
      <stop offset="0%" stop-color="#FF9178" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FF9178" stop-opacity="0.0"/>
    </radialGradient>
    <radialGradient id="c2">
      <stop offset="0%" stop-color="#46AABE" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#46AABE" stop-opacity="0.0"/>
    </radialGradient>
    <radialGradient id="c3">
      <stop offset="0%" stop-color="#FFC85A" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FFC85A" stop-opacity="0.0"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="360" rx="28" fill="url(#contactbg)"/>
  <circle cx="1050" cy="100" r="150" fill="url(#c1)">
    <animate attributeName="cy" values="100;140;60;100" dur="20s" repeatCount="indefinite"/>
  </circle>
  <circle cx="150" cy="280" r="160" fill="url(#c2)">
    <animate attributeName="cx" values="150;200;100;150" dur="22s" repeatCount="indefinite"/>
  </circle>
  <circle cx="600" cy="180" r="120" fill="url(#c3)">
    <animate attributeName="cy" values="180;160;200;180" dur="18s" repeatCount="indefinite"/>
  </circle>

  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif">
    <text x="60" y="60" font-size="13" font-weight="700" fill="#0F6A85" letter-spacing="2">LET'S TALK</text>

    <text x="60" y="120" font-size="28" font-weight="700" fill="#063044" letter-spacing="-0.8">Open to new challenges</text>

    <g transform="translate(60, 160)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif" font-size="14" font-weight="500">
      <g transform="translate(0, 0)">
        <rect width="148" height="36" rx="10" fill="#CFECF3"/>
        <text x="74" y="23" fill="#0F6A85" text-anchor="middle">ML Engineer</text>
      </g>
      <g transform="translate(160, 0)">
        <rect width="168" height="36" rx="10" fill="#FFECB5"/>
        <text x="84" y="23" fill="#A06A0A" text-anchor="middle">MLOps Engineer</text>
      </g>
      <g transform="translate(340, 0)">
        <rect width="148" height="36" rx="10" fill="#FFD9CC"/>
        <text x="74" y="23" fill="#B53E22" text-anchor="middle">AI Engineer</text>
      </g>
      <g transform="translate(500, 0)">
        <rect width="194" height="36" rx="10" fill="#F4E0EE"/>
        <text x="97" y="23" fill="#A03878" text-anchor="middle">Senior SDET with AI</text>
      </g>
    </g>

    <text x="60" y="238" font-size="15" fill="#2A5870">
      <tspan x="60" dy="0">Digital nomad based in Spain 🇪🇸 · Open to Europe &amp; remote worldwide</tspan>
    </text>

    <g transform="translate(60, 278)">
      <g transform="translate(0, 0)">
        <rect width="156" height="44" rx="12" fill="rgba(255,255,255,0.9)" stroke="rgba(15,106,133,0.25)" stroke-width="1"/>
        <text x="24" y="28" font-size="14" font-weight="500" fill="#0F6A85">LinkedIn →</text>
      </g>
      <g transform="translate(172, 0)">
        <rect width="140" height="44" rx="12" fill="rgba(255,255,255,0.9)" stroke="rgba(160,106,10,0.25)" stroke-width="1"/>
        <text x="24" y="28" font-size="14" font-weight="500" fill="#A06A0A">Email →</text>
      </g>
      <g transform="translate(328, 0)">
        <rect width="140" height="44" rx="12" fill="rgba(255,255,255,0.9)" stroke="rgba(181,62,34,0.25)" stroke-width="1"/>
        <text x="24" y="28" font-size="14" font-weight="500" fill="#B53E22">GitHub →</text>
      </g>
    </g>

  </g>
</svg>
