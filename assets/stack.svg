        </g>
        <g transform="translate(274, 0)"><rect width="260" height="80" rx="16" fill="rgba(255,255,255,0.7)" stroke="rgba(125,186,136,0.2)" stroke-width="1"/>
          <g transform="translate(14, 14)">
            <rect width="28" height="28" rx="8" fill="#CFECF3"/>
            <text x="14" y="20" font-size="14" text-anchor="middle">📊</text>
          </g>
          <text x="54" y="28" font-size="13" font-weight="600" fill="#063044">MLOps tooling</text>
          <text x="54" y="46" font-size="11" fill="#2A5870">Track, explain, deploy</text>
          <g transform="translate(14, 52)" font-size="10" font-weight="500">
            <g><rect width="50" height="18" rx="5" fill="#D6EDD8"/><text x="25" y="13" fill="#3B7A45" text-anchor="middle">MLflow</text></g>
            <g transform="translate(58, 0)"><rect width="42" height="18" rx="5" fill="#FFECB5"/><text x="21" y="13" fill="#A06A0A" text-anchor="middle">SHAP</text></g>
            <g transform="translate(108, 0)"><rect width="62" height="18" rx="5" fill="#F4E0EE"/><text x="31" y="13" fill="#A03878" text-anchor="middle">FastAPI</text></g>
          </g>
        </g>
      </g>
    </g>

    <g transform="translate(580, 180)">
      <text font-size="11" font-weight="600" fill="#A03878" letter-spacing="1.5">
        <tspan x="0" y="0">AI ENGINEERING</tspan>
      </text>
      <g transform="translate(0, 20)">
        <g transform="translate(0, 0)"><rect width="260" height="80" rx="16" fill="rgba(255,255,255,0.7)" stroke="rgba(208,138,190,0.2)" stroke-width="1"/>
          <g transform="translate(14, 14)">
            <rect width="28" height="28" rx="8" fill="#FFD9CC"/>
            <text x="14" y="20" font-size="14" text-anchor="middle">🤖</text>
          </g>
          <text x="54" y="28" font-size="13" font-weight="600" fill="#063044">LLMs &amp; agents</text>
          <text x="54" y="46" font-size="11" fill="#2A5870">Multi-agent orchestration</text>
          <g transform="translate(14, 52)" font-size="10" font-weight="500">
            <g><rect width="62" height="18" rx="5" fill="#D6EDD8"/><text x="31" y="13" fill="#3B7A45" text-anchor="middle">LangGraph</text></g>
            <g transform="translate(70, 0)"><rect width="74" height="18" rx="5" fill="#CFECF3"/><text x="37" y="13" fill="#0F6A85" text-anchor="middle">Claude API</text></g>
          </g>
        </g>
        <g transform="translate(274, 0)"><rect width="260" height="80" rx="16" fill="rgba(255,255,255,0.7)" stroke="rgba(208,138,190,0.2)" stroke-width="1"/>
          <g transform="translate(14, 14)">
            <rect width="28" height="28" rx="8" fill="#F4E0EE"/>
            <text x="14" y="20" font-size="14" text-anchor="middle">🔍</text>
          </g>
          <text x="54" y="28" font-size="13" font-weight="600" fill="#063044">RAG &amp; vector search</text>
          <text x="54" y="46" font-size="11" fill="#2A5870">Context-aware retrieval</text>
          <g transform="translate(14, 52)" font-size="10" font-weight="500">
            <g><rect width="62" height="18" rx="5" fill="#FFECB5"/><text x="31" y="13" fill="#A06A0A" text-anchor="middle">ChromaDB</text></g>
            <g transform="translate(70, 0)"><rect width="72" height="18" rx="5" fill="#FFD9CC"/><text x="36" y="13" fill="#B53E22" text-anchor="middle">embeddings</text></g>
          </g>
        </g>
      </g>
    </g>

  </g>
</svg>
