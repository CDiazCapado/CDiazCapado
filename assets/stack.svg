<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 460" role="img" aria-label="Tech stack organized in 4 categories: Software and Automation, DevOps, Machine Learning, AI Engineering">
  <defs>
    <linearGradient id="stackbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FEFDFA"/>
      <stop offset="50%" stop-color="#FBFDFE"/>
      <stop offset="100%" stop-color="#FEFDF9"/>
    </linearGradient>
    <radialGradient id="sblob1">
      <stop offset="0%" stop-color="#46AABE" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#46AABE" stop-opacity="0.0"/>
    </radialGradient>
    <radialGradient id="sblob2">
      <stop offset="0%" stop-color="#FFC85A" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FFC85A" stop-opacity="0.0"/>
    </radialGradient>
    <radialGradient id="sblob3">
      <stop offset="0%" stop-color="#FF9178" stop-opacity="0.125"/>
      <stop offset="100%" stop-color="#FF9178" stop-opacity="0.0"/>
    </radialGradient>
    <radialGradient id="sblob4">
      <stop offset="0%" stop-color="#D08ABE" stop-opacity="0.125"/>
      <stop offset="100%" stop-color="#D08ABE" stop-opacity="0.0"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="460" rx="28" fill="url(#stackbg)"/>
  <circle cx="100" cy="80" r="140" fill="url(#sblob1)">
    <animate attributeName="cx" values="100;160;60;100" dur="22s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1100" cy="100" r="150" fill="url(#sblob2)">
    <animate attributeName="cx" values="1100;1040;1140;1100" dur="26s" repeatCount="indefinite"/>
  </circle>
  <circle cx="100" cy="380" r="160" fill="url(#sblob3)">
    <animate attributeName="cy" values="380;340;420;380" dur="20s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1100" cy="380" r="150" fill="url(#sblob4)">
    <animate attributeName="cy" values="380;420;340;380" dur="24s" repeatCount="indefinite"/>
  </circle>

  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif">

    <g transform="translate(60, 60)">
      <text font-size="13" font-weight="700" fill="#0F6A85" letter-spacing="2">
        <tspan x="0" y="0">SOFTWARE &amp; AUTOMATION</tspan>
      </text>
      <g transform="translate(0, 24)">
        <rect width="500" height="110" rx="18" fill="rgba(255,255,255,0.85)" stroke="rgba(70,170,190,0.2)" stroke-width="1"/>
        <text x="24" y="38" font-size="17" font-weight="600" fill="#063044">Engineering foundation</text>
        <text x="24" y="60" font-size="13" fill="#2A5870">10+ years building and testing production systems</text>
        <g transform="translate(24, 70)" font-size="12" font-weight="500">
          <g><rect width="70" height="26" rx="7" fill="#CFECF3"/><text x="35" y="17" fill="#0F6A85" text-anchor="middle">Python</text></g>
          <g transform="translate(80, 0)"><rect width="86" height="26" rx="7" fill="#FFD9CC"/><text x="43" y="17" fill="#B53E22" text-anchor="middle">Playwright</text></g>
          <g transform="translate(176, 0)"><rect width="76" height="26" rx="7" fill="#D6EDD8"/><text x="38" y="17" fill="#3B7A45" text-anchor="middle">Selenium</text></g>
          <g transform="translate(262, 0)"><rect width="56" height="26" rx="7" fill="#FFECB5"/><text x="28" y="17" fill="#A06A0A" text-anchor="middle">Pytest</text></g>
          <g transform="translate(328, 0)"><rect width="66" height="26" rx="7" fill="#F4E0EE"/><text x="33" y="17" fill="#A03878" text-anchor="middle">Jenkins</text></g>
        </g>
      </g>
    </g>

    <g transform="translate(640, 60)">
      <text font-size="13" font-weight="700" fill="#A06A0A" letter-spacing="2">
        <tspan x="0" y="0">DEVOPS &amp; INFRASTRUCTURE</tspan>
      </text>
      <g transform="translate(0, 24)">
        <rect width="500" height="110" rx="18" fill="rgba(255,255,255,0.85)" stroke="rgba(255,200,90,0.28)" stroke-width="1"/>
        <text x="24" y="38" font-size="17" font-weight="600" fill="#063044">Scalable infrastructure</text>
        <text x="24" y="60" font-size="13" fill="#2A5870">Containers, IaC and cloud-native deployment</text>
        <g transform="translate(24, 70)" font-size="12" font-weight="500">
          <g><rect width="70" height="26" rx="7" fill="#CFECF3"/><text x="35" y="17" fill="#0F6A85" text-anchor="middle">Docker</text></g>
          <g transform="translate(80, 0)"><rect width="96" height="26" rx="7" fill="#F4E0EE"/><text x="48" y="17" fill="#A03878" text-anchor="middle">Kubernetes</text></g>
          <g transform="translate(186, 0)"><rect width="54" height="26" rx="7" fill="#FFECB5"/><text x="27" y="17" fill="#A06A0A" text-anchor="middle">AWS</text></g>
          <g transform="translate(250, 0)"><rect width="82" height="26" rx="7" fill="#D6EDD8"/><text x="41" y="17" fill="#3B7A45" text-anchor="middle">Terraform</text></g>
          <g transform="translate(342, 0)"><rect width="96" height="26" rx="7" fill="#FFD9CC"/><text x="48" y="17" fill="#B53E22" text-anchor="middle">GitHub CI/CD</text></g>
        </g>
      </g>
    </g>

    <g transform="translate(60, 270)">
      <text font-size="13" font-weight="700" fill="#3B7A45" letter-spacing="2">
        <tspan x="0" y="0">MACHINE LEARNING &amp; MLOPS</tspan>
      </text>
      <g transform="translate(0, 24)">
        <rect width="500" height="110" rx="18" fill="rgba(255,255,255,0.85)" stroke="rgba(125,186,136,0.28)" stroke-width="1"/>
        <text x="24" y="38" font-size="17" font-weight="600" fill="#063044">Models, tracking and deployment</text>
        <text x="24" y="60" font-size="13" fill="#2A5870">End-to-end ML systems with production discipline</text>
        <g transform="translate(24, 70)" font-size="12" font-weight="500">
          <g><rect width="88" height="26" rx="7" fill="#FFECB5"/><text x="44" y="17" fill="#A06A0A" text-anchor="middle">scikit-learn</text></g>
          <g transform="translate(98, 0)"><rect width="78" height="26" rx="7" fill="#D6EDD8"/><text x="39" y="17" fill="#3B7A45" text-anchor="middle">LightGBM</text></g>
          <g transform="translate(186, 0)"><rect width="66" height="26" rx="7" fill="#FFD9CC"/><text x="33" y="17" fill="#B53E22" text-anchor="middle">PyTorch</text></g>
          <g transform="translate(262, 0)"><rect width="62" height="26" rx="7" fill="#CFECF3"/><text x="31" y="17" fill="#0F6A85" text-anchor="middle">MLflow</text></g>
          <g transform="translate(334, 0)"><rect width="54" height="26" rx="7" fill="#F4E0EE"/><text x="27" y="17" fill="#A03878" text-anchor="middle">SHAP</text></g>
        </g>
      </g>
    </g>

    <g transform="translate(640, 270)">
      <text font-size="13" font-weight="700" fill="#A03878" letter-spacing="2">
        <tspan x="0" y="0">AI ENGINEERING</tspan>
      </text>
      <g transform="translate(0, 24)">
        <rect width="500" height="110" rx="18" fill="rgba(255,255,255,0.85)" stroke="rgba(208,138,190,0.28)" stroke-width="1"/>
        <text x="24" y="38" font-size="17" font-weight="600" fill="#063044">LLMs, agents and RAG</text>
        <text x="24" y="60" font-size="13" fill="#2A5870">Multi-agent orchestration, fine-tuning and retrieval</text>
        <g transform="translate(24, 70)" font-size="12" font-weight="500">
          <g><rect width="82" height="26" rx="7" fill="#D6EDD8"/><text x="41" y="17" fill="#3B7A45" text-anchor="middle">LangGraph</text></g>
          <g transform="translate(92, 0)"><rect width="92" height="26" rx="7" fill="#CFECF3"/><text x="46" y="17" fill="#0F6A85" text-anchor="middle">Claude API</text></g>
          <g transform="translate(194, 0)"><rect width="82" height="26" rx="7" fill="#FFECB5"/><text x="41" y="17" fill="#A06A0A" text-anchor="middle">ChromaDB</text></g>
          <g transform="translate(286, 0)"><rect width="60" height="26" rx="7" fill="#FFD9CC"/><text x="30" y="17" fill="#B53E22" text-anchor="middle">Llama</text></g>
          <g transform="translate(356, 0)"><rect width="60" height="26" rx="7" fill="#F4E0EE"/><text x="30" y="17" fill="#A03878" text-anchor="middle">LoRA</text></g>
        </g>
      </g>
    </g>

  </g>
</svg>
