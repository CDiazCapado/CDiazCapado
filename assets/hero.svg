<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" width="1200" height="340" role="img" aria-label="Cristina Diaz Capado — Software Engineer expanding into MLOps and AI Engineering">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FDFBF4"/>
      <stop offset="50%" stop-color="#F4FBFD"/>
      <stop offset="100%" stop-color="#FFF8ED"/>
    </linearGradient>
    <radialGradient id="blob1">
      <stop offset="0%" stop-color="#46AABE" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#46AABE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob2">
      <stop offset="0%" stop-color="#FFC85A" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#FFC85A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob3">
      <stop offset="0%" stop-color="#FF9178" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FF9178" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob4">
      <stop offset="0%" stop-color="#7DBA88" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7DBA88" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob5">
      <stop offset="0%" stop-color="#D08ABE" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#D08ABE" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="clip">
      <rect width="1200" height="340" rx="32" ry="32"/>
    </clipPath>
  </defs>

  <rect width="1200" height="340" rx="32" ry="32" fill="url(#bg)"/>

  <g clip-path="url(#clip)">
    <circle cx="1050" cy="80" r="180" fill="url(#blob1)">
      <animate attributeName="cx" values="1050;1080;1020;1050" dur="16s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="80;110;60;80" dur="16s" repeatCount="indefinite"/>
    </circle>
    <circle cx="150" cy="280" r="200" fill="url(#blob2)">
      <animate attributeName="cx" values="150;180;120;150" dur="20s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="280;260;300;280" dur="20s" repeatCount="indefinite"/>
    </circle>
    <circle cx="950" cy="260" r="160" fill="url(#blob3)">
      <animate attributeName="cx" values="950;920;980;950" dur="18s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="260;290;240;260" dur="18s" repeatCount="indefinite"/>
    </circle>
    <circle cx="350" cy="60" r="140" fill="url(#blob4)">
      <animate attributeName="cx" values="350;380;320;350" dur="22s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="60;80;40;60" dur="22s" repeatCount="indefinite"/>
    </circle>
    <circle cx="600" cy="180" r="120" fill="url(#blob5)">
      <animate attributeName="cx" values="600;630;570;600" dur="14s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="180;160;200;180" dur="14s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g transform="translate(70, 70)">
    <rect x="0" y="0" width="210" height="32" rx="16" fill="rgba(255,255,255,0.85)"/>
    <circle cx="22" cy="16" r="4" fill="#7DBA88">
      <animate attributeName="opacity" values="1;0.4;1" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <text x="38" y="21" font-family="-apple-system, 'Inter', sans-serif" font-size="13" font-weight="500" fill="#0F6A85">Open to MLOps &amp; AI roles</text>
  </g>

  <g transform="translate(70, 130)">
    <text font-family="-apple-system, 'Inter', sans-serif" font-size="44" font-weight="700" fill="#063044" letter-spacing="-1.5">
      <tspan x="0" y="0">Cristina Díaz Capado</tspan>
    </text>
    <text font-family="-apple-system, 'Inter', sans-serif" font-size="20" font-weight="500" fill="#0F6A85" letter-spacing="-0.3">
      <tspan x="0" y="38">Software Engineer · Automation &amp; DevOps → expanding into MLOps &amp; AI Engineering</tspan>
    </text>
    <text font-family="-apple-system, 'Inter', sans-serif" font-size="15" font-weight="400" fill="#2A5870" letter-spacing="-0.1">
      <tspan x="0" y="72">Based in Nice · France 🇫🇷 · Building production-grade AI systems with engineering rigor</tspan>
    </text>
  </g>

  <g transform="translate(70, 248)">
    <g>
      <rect x="0" y="0" width="86" height="32" rx="8" fill="#CFECF3"/>
      <text x="43" y="21" font-family="-apple-system, 'Inter', sans-serif" font-size="12" font-weight="500" fill="#0F6A85" text-anchor="middle">Python</text>
    </g>
    <g transform="translate(96, 0)">
      <rect x="0" y="0" width="96" height="32" rx="8" fill="#FFECB5"/>
      <text x="48" y="21" font-family="-apple-system, 'Inter', sans-serif" font-size="12" font-weight="500" fill="#A06A0A" text-anchor="middle">LightGBM</text>
    </g>
    <g transform="translate(202, 0)">
      <rect x="0" y="0" width="86" height="32" rx="8" fill="#FFD9CC"/>
      <text x="43" y="21" font-family="-apple-system, 'Inter', sans-serif" font-size="12" font-weight="500" fill="#B53E22" text-anchor="middle">FastAPI</text>
    </g>
    <g transform="translate(298, 0)">
      <rect x="0" y="0" width="80" height="32" rx="8" fill="#D6EDD8"/>
      <text x="40" y="21" font-family="-apple-system, 'Inter', sans-serif" font-size="12" font-weight="500" fill="#3B7A45" text-anchor="middle">MLflow</text>
    </g>
    <g transform="translate(388, 0)">
      <rect x="0" y="0" width="78" height="32" rx="8" fill="#F4E0EE"/>
      <text x="39" y="21" font-family="-apple-system, 'Inter', sans-serif" font-size="12" font-weight="500" fill="#A03878" text-anchor="middle">Docker</text>
    </g>
    <g transform="translate(476, 0)">
      <rect x="0" y="0" width="76" height="32" rx="8" fill="#CFECF3"/>
      <text x="38" y="21" font-family="-apple-system, 'Inter', sans-serif" font-size="12" font-weight="500" fill="#0F6A85" text-anchor="middle">AWS</text>
    </g>
    <g transform="translate(562, 0)">
      <rect x="0" y="0" width="90" height="32" rx="8" fill="#FFECB5"/>
      <text x="45" y="21" font-family="-apple-system, 'Inter', sans-serif" font-size="12" font-weight="500" fill="#A06A0A" text-anchor="middle">Terraform</text>
    </g>
    <g transform="translate(662, 0)">
      <rect x="0" y="0" width="96" height="32" rx="8" fill="#FFD9CC"/>
      <text x="48" y="21" font-family="-apple-system, 'Inter', sans-serif" font-size="12" font-weight="500" fill="#B53E22" text-anchor="middle">Kubernetes</text>
    </g>
  </g>
</svg>
