<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 460" role="img" aria-label="Cristina Diaz Capado — Software Engineer expanding into MLOps and AI Engineering">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FEFDFA"/>
      <stop offset="50%" stop-color="#FBFDFE"/>
      <stop offset="100%" stop-color="#FEFDF9"/>
    </linearGradient>
    <radialGradient id="blob1">
      <stop offset="0%" stop-color="#46AABE" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#46AABE" stop-opacity="0.0"/>
    </radialGradient>
    <radialGradient id="blob2">
      <stop offset="0%" stop-color="#FFC85A" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#FFC85A" stop-opacity="0.0"/>
    </radialGradient>
    <radialGradient id="blob3">
      <stop offset="0%" stop-color="#FF9178" stop-opacity="0.225"/>
      <stop offset="100%" stop-color="#FF9178" stop-opacity="0.0"/>
    </radialGradient>
    <radialGradient id="blob4">
      <stop offset="0%" stop-color="#7DBA88" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#7DBA88" stop-opacity="0.0"/>
    </radialGradient>
    <radialGradient id="blob5">
      <stop offset="0%" stop-color="#D08ABE" stop-opacity="0.175"/>
      <stop offset="100%" stop-color="#D08ABE" stop-opacity="0.0"/>
    </radialGradient>
    <clipPath id="clipBox">
      <rect width="1200" height="460" rx="36"/>
    </clipPath>
  </defs>

  <rect width="1200" height="460" rx="36" fill="url(#bg)"/>

  <g clip-path="url(#clipBox)">
    <circle cx="1050" cy="100" r="220" fill="url(#blob1)">
      <animate attributeName="cx" values="1050;1100;1000;1050" dur="20s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="100;140;60;100" dur="20s" repeatCount="indefinite"/>
      <animate attributeName="r" values="220;250;200;220" dur="20s" repeatCount="indefinite"/>
    </circle>
    <circle cx="150" cy="380" r="240" fill="url(#blob2)">
      <animate attributeName="cx" values="150;200;100;150" dur="24s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="380;340;420;380" dur="24s" repeatCount="indefinite"/>
      <animate attributeName="r" values="240;270;220;240" dur="24s" repeatCount="indefinite"/>
    </circle>
    <circle cx="950" cy="360" r="180" fill="url(#blob3)">
      <animate attributeName="cx" values="950;900;1000;950" dur="18s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="360;400;320;360" dur="18s" repeatCount="indefinite"/>
    </circle>
    <circle cx="350" cy="80" r="160" fill="url(#blob4)">
      <animate attributeName="cx" values="350;420;280;350" dur="26s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="80;120;40;80" dur="26s" repeatCount="indefinite"/>
    </circle>
    <circle cx="620" cy="220" r="140" fill="url(#blob5)">
      <animate attributeName="cx" values="620;680;560;620" dur="16s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="220;180;260;220" dur="16s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g transform="translate(80, 80)">
    <rect width="260" height="40" rx="20" fill="rgba(255,255,255,0.9)"/>
    <circle cx="24" cy="20" r="5" fill="#7DBA88">
      <animate attributeName="opacity" values="1;0.3;1" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <text x="44" y="26" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif" font-size="15" font-weight="500" fill="#0F6A85">Open to MLOps &amp; AI roles</text>
  </g>

  <g transform="translate(80, 170)">
    <text font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif" font-size="60" font-weight="700" fill="#063044" letter-spacing="-2">
      <tspan x="0" y="0">Cristina Díaz Capado</tspan>
    </text>
  </g>

  <g transform="translate(80, 230)">
    <text font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif" font-size="24" font-weight="500" fill="#0F6A85" letter-spacing="-0.3">
      <tspan x="0" y="0">Software Engineer · Automation &amp; DevOps</tspan>
    </text>
    <text font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif" font-size="24" font-weight="500" fill="#FF9178" letter-spacing="-0.3">
      <tspan x="0" y="32">expanding into MLOps &amp; AI Engineering</tspan>
    </text>
  </g>

  <g transform="translate(80, 308)">
    <text font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif" font-size="16" font-weight="400" fill="#2A5870">
      <tspan x="0" y="0">Based in Spain 🇪🇸 · Digital nomad · Building production-grade AI systems with engineering rigor</tspan>
    </text>
  </g>

  <g transform="translate(80, 365)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif" font-size="14" font-weight="500">
    <g transform="translate(0, 0)">
      <rect width="96" height="38" rx="10" fill="#CFECF3"/>
      <text x="48" y="24" fill="#0F6A85" text-anchor="middle">Python</text>
    </g>
    <g transform="translate(108, 0)">
      <rect width="112" height="38" rx="10" fill="#FFECB5"/>
      <text x="56" y="24" fill="#A06A0A" text-anchor="middle">LightGBM</text>
    </g>
    <g transform="translate(232, 0)">
      <rect width="102" height="38" rx="10" fill="#FFD9CC"/>
      <text x="51" y="24" fill="#B53E22" text-anchor="middle">FastAPI</text>
    </g>
    <g transform="translate(346, 0)">
      <rect width="96" height="38" rx="10" fill="#D6EDD8"/>
      <text x="48" y="24" fill="#3B7A45" text-anchor="middle">MLflow</text>
    </g>
    <g transform="translate(454, 0)">
      <rect width="94" height="38" rx="10" fill="#F4E0EE"/>
      <text x="47" y="24" fill="#A03878" text-anchor="middle">Docker</text>
    </g>
    <g transform="translate(560, 0)">
      <rect width="80" height="38" rx="10" fill="#CFECF3"/>
      <text x="40" y="24" fill="#0F6A85" text-anchor="middle">AWS</text>
    </g>
    <g transform="translate(652, 0)">
      <rect width="108" height="38" rx="10" fill="#FFECB5"/>
      <text x="54" y="24" fill="#A06A0A" text-anchor="middle">Terraform</text>
    </g>
    <g transform="translate(772, 0)">
      <rect width="120" height="38" rx="10" fill="#FFD9CC"/>
      <text x="60" y="24" fill="#B53E22" text-anchor="middle">Kubernetes</text>
    </g>
  </g>

</svg>
