<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 460" role="img" aria-label="About Cristina — Software Engineer expanding into MLOps and AI">
  <defs>
    <linearGradient id="aboutbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FEFDFA"/>
      <stop offset="50%" stop-color="#FBFDFE"/>
      <stop offset="100%" stop-color="#FEFDF9"/>
    </linearGradient>
    <radialGradient id="ab1">
      <stop offset="0%" stop-color="#46AABE" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#46AABE" stop-opacity="0.0"/>
    </radialGradient>
    <radialGradient id="ab2">
      <stop offset="0%" stop-color="#FFC85A" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FFC85A" stop-opacity="0.0"/>
    </radialGradient>
    <radialGradient id="ab3">
      <stop offset="0%" stop-color="#7DBA88" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#7DBA88" stop-opacity="0.0"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="460" rx="28" fill="url(#aboutbg)"/>
  <circle cx="1100" cy="80" r="160" fill="url(#ab1)">
    <animate attributeName="cx" values="1100;1060;1140;1100" dur="22s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="80;120;40;80" dur="22s" repeatCount="indefinite"/>
  </circle>
  <circle cx="100" cy="400" r="180" fill="url(#ab2)">
    <animate attributeName="cx" values="100;160;40;100" dur="26s" repeatCount="indefinite"/>
  </circle>
  <circle cx="600" cy="230" r="120" fill="url(#ab3)">
    <animate attributeName="cy" values="230;260;200;230" dur="18s" repeatCount="indefinite"/>
  </circle>

  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif">

    <text x="60" y="70" font-size="13" font-weight="700" fill="#0F6A85" letter-spacing="2">ABOUT</text>

    <g transform="translate(60, 100)">
      <text fill="#063044" font-size="17" font-weight="500">
        <tspan x="0" dy="0">I build production systems. My foundation is </tspan>
        <tspan font-weight="700" fill="#0F6A85">software engineering</tspan>
        <tspan font-weight="500" fill="#063044"> with deep</tspan>
        <tspan x="0" dy="28">expertise in </tspan>
        <tspan font-weight="700" fill="#0F6A85">test automation and DevOps</tspan>
        <tspan font-weight="500" fill="#063044"> — architecting CI/CD pipelines, designing</tspan>
        <tspan x="0" dy="28">automation frameworks, and shipping reliable software at scale. That same engineering</tspan>
        <tspan x="0" dy="28">rigor is what I now bring to </tspan>
        <tspan font-weight="700" fill="#FF9178">MLOps and AI Engineering</tspan>
        <tspan font-weight="500" fill="#063044">.</tspan>
      </text>
    </g>

    <g transform="translate(60, 250)">
      <text fill="#2A5870" font-size="15" font-weight="400">
        <tspan x="0" dy="0">The stack evolved; the mindset did not. Testable, observable, deployable, reproducible</tspan>
        <tspan x="0" dy="24">— the principles that make infrastructure reliable are the ones that make ML systems</tspan>
        <tspan x="0" dy="24">production-ready. Most ML projects fail not because the model is weak, but because the</tspan>
        <tspan x="0" dy="24">engineering around it is. </tspan>
        <tspan font-weight="700" fill="#A03878">That gap is where I work.</tspan>
      </text>
    </g>

    <g transform="translate(60, 400)">
      <rect width="520" height="40" rx="20" fill="rgba(255,255,255,0.9)"/>
      <text x="24" y="26" fill="#063044" font-size="14" font-weight="500">Currently building NomadOptima + a portfolio of AI projects</text>
      <circle cx="540" cy="20" r="4" fill="#3B7A45">
        <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
      </circle>
    </g>

  </g>
</svg>
