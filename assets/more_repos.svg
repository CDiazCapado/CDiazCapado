<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" role="img" aria-label="Other repos in this profile">
  <defs>
    <linearGradient id="morebg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FBFDFE"/>
      <stop offset="50%" stop-color="#FEFDF9"/>
      <stop offset="100%" stop-color="#FEFDFA"/>
    </linearGradient>
    <radialGradient id="m1">
      <stop offset="0%" stop-color="#7DBA88" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#7DBA88" stop-opacity="0.0"/>
    </radialGradient>
    <radialGradient id="m2">
      <stop offset="0%" stop-color="#D08ABE" stop-opacity="0.125"/>
      <stop offset="100%" stop-color="#D08ABE" stop-opacity="0.0"/>
    </radialGradient>
    <linearGradient id="micon1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9BCFA4"/><stop offset="100%" stop-color="#7DBA88"/>
    </linearGradient>
    <linearGradient id="micon2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6FC8DB"/><stop offset="100%" stop-color="#46AABE"/>
    </linearGradient>
    <linearGradient id="micon3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E0A6D2"/><stop offset="100%" stop-color="#D08ABE"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="340" rx="28" fill="url(#morebg)"/>
  <circle cx="150" cy="80" r="140" fill="url(#m1)">
    <animate attributeName="cx" values="150;100;200;150" dur="24s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1050" cy="280" r="150" fill="url(#m2)">
    <animate attributeName="cx" values="1050;1100;1000;1050" dur="22s" repeatCount="indefinite"/>
  </circle>

  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif">
    <text x="60" y="60" font-size="13" font-weight="700" fill="#0F6A85" letter-spacing="2">ALSO IN THIS PROFILE</text>

    <g transform="translate(60, 90)">
