      <rect x="24" y="24" width="44" height="44" rx="12" fill="url(#micon1)"/>
      <text x="46" y="54" font-size="20" text-anchor="middle">📚</text>
      <text x="24" y="108" font-size="18" font-weight="700" fill="#063044" letter-spacing="-0.3">ML Bootcamp 4Geeks</text>
      <text x="24" y="134" font-size="13" fill="#2A5870">
        <tspan x="24" dy="0">Monorepo with all coursework organized</tspan>
        <tspan x="24" dy="18">by module: SQL, scraping, APIs, supervised</tspan>
        <tspan x="24" dy="18">&amp; unsupervised ML, DL, NLP.</tspan>
      </text>
      <g transform="translate(24, 200)">
        <rect width="66" height="28" rx="8" fill="#D6EDD8"/>
        <text x="33" y="19" font-size="12" font-weight="500" fill="#3B7A45" text-anchor="middle">9 modules</text>
      </g>
    </g>

    <g transform="translate(440, 90)">
      <rect width="360" height="210" rx="20" fill="rgba(255,255,255,0.85)" stroke="rgba(70,170,190,0.25)" stroke-width="1"/>
      <rect x="24" y="24" width="44" height="44" rx="12" fill="url(#micon2)"/>
      <text x="46" y="54" font-size="20" text-anchor="middle">🧭</text>
      <text x="24" y="108" font-size="18" font-weight="700" fill="#063044" letter-spacing="-0.3">NomadOptima</text>
      <text x="24" y="134" font-size="13" fill="#2A5870">
        <tspan x="24" dy="0">Flagship ML project with full engineering</tspan>
        <tspan x="24" dy="18">pipeline: ingestion, features, Learning to</tspan>
        <tspan x="24" dy="18">Rank, explainability and API serving.</tspan>
      </text>
      <g transform="translate(24, 200)">
        <rect width="58" height="28" rx="8" fill="#CFECF3"/>
        <text x="29" y="19" font-size="12" font-weight="500" fill="#0F6A85" text-anchor="middle">Flagship</text>
      </g>
    </g>

    <g transform="translate(820, 90)">
      <rect width="320" height="210" rx="20" fill="rgba(255,255,255,0.85)" stroke="rgba(208,138,190,0.25)" stroke-width="1"/>
      <rect x="24" y="24" width="44" height="44" rx="12" fill="url(#micon3)"/>
      <text x="46" y="54" font-size="20" text-anchor="middle">🔬</text>
      <text x="24" y="108" font-size="18" font-weight="700" fill="#063044" letter-spacing="-0.3">Experiments &amp; writeups</text>
      <text x="24" y="134" font-size="13" fill="#2A5870">
        <tspan x="24" dy="0">Smaller repos with contributions,</tspan>
        <tspan x="24" dy="18">spikes and technical writeups</tspan>
        <tspan x="24" dy="18">in the repo list below.</tspan>
      </text>
      <g transform="translate(24, 200)">
        <rect width="70" height="28" rx="8" fill="#F4E0EE"/>
        <text x="35" y="19" font-size="12" font-weight="500" fill="#A03878" text-anchor="middle">Ongoing</text>
      </g>
